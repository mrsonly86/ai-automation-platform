version: '3.8'

services:
  # PostgreSQL Database (Free local alternative to Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: ai-platform-postgres
    environment:
      POSTGRES_USER: ai_platform
      POSTGRES_PASSWORD: ai_platform_password
      POSTGRES_DB: ai_platform_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - ai-platform-network

  # Redis Cache (Free local alternative to Upstash)
  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    command: redis-server --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-platform-network

  # pgAdmin (Database management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ai-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ai-platform-network
    profiles:
      - tools  # Optional service

  # Redis Insight (Redis management UI)
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: ai-platform-redis-insight
    ports:
      - "8001:8001"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-platform-network
    profiles:
      - tools  # Optional service

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-platform-network:
    driver: bridge

# Usage:
# Start core services: docker-compose -f docker-compose.free.yml up -d
# Start with tools: docker-compose -f docker-compose.free.yml --profile tools up -d
# Stop services: docker-compose -f docker-compose.free.yml down
# Reset data: docker-compose -f docker-compose.free.yml down -v